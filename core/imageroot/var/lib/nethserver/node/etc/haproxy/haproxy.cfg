#
# HAProxy configuration for NS8 rclone-gateway service
#

global
    daemon
    maxconn 2048
    presetenv CLUSTER_NETWORK 0.0.0.0/32 # fallback if not set
    presetenv DEBUG 0                     # fallback if not set
    log stdout format raw local0 debug

defaults
    mode http
    timeout connect 5s
    timeout client  5s
    timeout server  5s
    log global

# ==========================================================
# GATEWAY FRONTEND (Port 4694)
# Routes to REST backend when the client sends
# "Accept: application/vnd.x.restic.rest.v2"; WebDAV otherwise.
# ==========================================================
frontend gateway_frontend
    bind :4694
    log-format "%ci [%t] %tsc %r | auth_group=%[var(txn.auth_group)] vpath=%[var(txn.vpath)] modrepo=%[var(txn.modrepo)] restore=%[var(txn.restore)] accept=%[var(txn.accept_hdr)]"

    #
    # Client IP-based authorization
    #
    http-request set-var(txn.accept_hdr) req.hdr(Accept)
    http-request set-log-level silent unless { env(DEBUG) -m str "1" }
    acl is_loopback src 127.0.0.1 ::1
    acl is_trusted  src "${CLUSTER_NETWORK}"
    http-request deny unless is_loopback or is_trusted

    #
    # Health-check authorization
    #
    acl health_request path_end _probe_rest_404
    http-request allow if health_request

    #
    # User authentication
    #

    # Make sure credentials are given:
    acl has_user http_auth_user -m found
    acl has_pass http_auth_pass -m found
    http-request auth realm ns8-rclone-gateway unless has_user has_pass
    # Build lookup key: "username:sha256hex" -> group
    http-request set-var(txn.pass_sha256) http_auth_pass,digest(sha256),hex,lower
    http-request set-var(txn.auth_key) http_auth_user,concat(:,txn.pass_sha256)
    http-request set-var(txn.auth_group) var(txn.auth_key),map(/etc/haproxy/auth.map)
    acl is_node   var(txn.auth_group) -m str "nodes"
    acl is_module var(txn.auth_group) -m str "modules"
    # Credentials check:
    http-request auth realm ns8-rclone-gateway unless is_node or is_module

    # Protocol detection: REST client sends this Accept header
    acl is_rest hdr(Accept) -m sub "application/vnd.x.restic.rest.v2"
    # Workaround for POST {path}?create=true that have no Accept header
    acl is_rest url_param(create) -m str "true"

    #
    # User authorization
    #

    # nodes: always pass through
    http-request allow if is_node

    # Common path-based vars for module authorization
    http-request set-var(txn.modrepo) http_auth_user,map(/etc/haproxy/modrepo.map)
    http-request set-var(txn.restore) var(txn.modrepo),map(/etc/haproxy/modrepo.map)
    http-request set-var(txn.appuuid) path,field(4,/),regsub(\.json$,)
    http-request set-var(txn.vpath)   path,field(3,/),concat(/,txn.appuuid,)

    acl is_root_path  path /
    acl is_read_method method GET HEAD OPTIONS PROPFIND
    acl is_repo_match var(txn.vpath),strcmp(txn.modrepo) -m int 0
    acl is_repo_match var(txn.vpath),strcmp(txn.restore) -m int 0
    acl delete_method method DELETE

    # REST-specific ACLs
    http-request set-var(txn.rest_type) path,field(5,/)
    acl is_lock_type var(txn.rest_type) -m str locks

    # modules (WebDAV): allow PROPFIND /
    http-request allow if is_module !is_rest is_read_method is_root_path
    # modules (WebDAV): allow read methods on their allowed repo paths
    http-request allow if is_module !is_rest is_read_method is_repo_match

    # modules (REST): check repo, allow DELETE on locks only
    http-request allow if is_module is_rest is_repo_match is_lock_type delete_method
    # modules (REST): check repo and permit non-DELETE queries
    http-request allow if is_module is_rest is_repo_match !delete_method

    # deny everything else:
    http-request deny

    # runtime-generated config:
    #{{INCLUDE-FRONTEND-SECTION}}#

    # default rclone_serve backends:
    use_backend default_rest if is_rest
    default_backend default_webdav

# ==========================================================
# DEFAULT RCLONE BACKENDS
# ==========================================================

backend default_webdav
    server default_webdav unix@/var/lib/rclone/backend-webdav.sock

backend default_rest
    server default_rest unix@/var/lib/rclone/backend-rest.sock


# ==========================================================
# FAILOVER BACKENDS
# For local clients only, provide failover configuration to
# backends that are not reachable from the local node
# ==========================================================

defaults
    mode http
    timeout connect 5s
    timeout client  5s
    timeout server  5s
    log global

    #{{INCLUDE-BACKENDS-SECTION}}#
