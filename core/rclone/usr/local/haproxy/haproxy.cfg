#
# HAProxy configuration for NS8 rclone-gateway service
#

global
    daemon
    maxconn 2048
    presetenv CLUSTER_NETWORK 0.0.0.0/32 # fallback if not set

defaults
    mode http
    timeout connect 5s
    timeout client  5m
    timeout server  5m

# ==========================================================
# WEBDAV FRONTEND (Port 4694)
# ==========================================================
frontend webdav_frontend
    bind :4694

    #
    # Client IP-based authorization
    #
    acl is_loopback src 127.0.0.1 ::1
    acl is_trusted  src "${CLUSTER_NETWORK}"
    http-request deny unless is_loopback or is_trusted

    #
    # User authentication
    #

    # Make sure credentials are given:
    acl has_user http_auth_user -m found
    acl has_pass http_auth_pass -m found
    http-request auth realm ns8-webdav unless has_user has_pass
    # Build lookup key: "username:sha256hex" -> group
    http-request set-var(txn.pass_sha256) http_auth_pass,digest(sha256),hex,lower
    http-request set-var(txn.auth_key) http_auth_user,concat(:,txn.pass_sha256)
    http-request set-var(txn.auth_group) var(txn.auth_key),map(/etc/haproxy/auth.map)
    acl is_node        var(txn.auth_group) -m str "nodes"
    acl is_module      var(txn.auth_group) -m str "modules"
    # Credentials check:
    http-request auth realm ns8-webdav unless is_node or is_module

    #
    # User authorization
    #

    # nodes: always pass through
    http-request allow if is_node

    # modules: check repo match
    http-request set-var(txn.modrepo) http_auth_user,map(/etc/haproxy/modrepo.map)
    http-request set-var(txn.restore) var(txn.modrepo),map(/etc/haproxy/modrepo.map)
    http-request set-var(txn.appuuid) path,field(4,/),regsub(\.json$,)
    http-request set-var(txn.vpath) path,field(3,/),concat(/,txn.appuuid,)

    acl is_root_path   path /
    acl is_read_method method GET HEAD OPTIONS PROPFIND
    acl is_repo_match  var(txn.vpath),strcmp(txn.modrepo) -m int 0
    acl is_repo_match  var(txn.vpath),strcmp(txn.restore) -m int 0

    # modules: allow PROPFIND /
    http-request allow if is_module is_read_method is_root_path
    # modules: allow read methods on their allowed repo paths
    http-request allow if is_module is_read_method is_repo_match

    # deny everything else:
    http-request deny
    default_backend rclone_webdav

# ==========================================================
# REST FRONTEND (Port 4695)
# ==========================================================

frontend rest_frontend
    bind :4695

    #
    # Client IP-based authorization
    #
    acl is_loopback src 127.0.0.1 ::1
    acl is_trusted  src "${CLUSTER_NETWORK}"
    http-request deny unless is_loopback or is_trusted

    #
    # User authentication
    #

    # Make sure credentials are given
    acl has_user http_auth_user -m found
    acl has_pass http_auth_pass -m found
    http-request auth realm ns8-rest unless has_user has_pass
    # Build lookup key: "username:sha256hex" -> group
    http-request set-var(txn.pass_sha256) http_auth_pass,digest(sha256),hex,lower
    http-request set-var(txn.auth_key) http_auth_user,concat(:,txn.pass_sha256)
    http-request set-var(txn.auth_group) var(txn.auth_key),map(/etc/haproxy/auth.map)
    acl is_node var(txn.auth_group) -m str "nodes"
    acl is_module var(txn.auth_group) -m str "modules"
    # Credentials check:
    http-request auth realm ns8-rest unless is_node or is_module

    #
    # User authorization
    #

    # nodes: always pass through
    http-request allow if is_node

    http-request set-var(txn.rest_type) path,field(5,/)
    http-request set-var(txn.modrepo) http_auth_user,map(/etc/haproxy/modrepo.map)
    http-request set-var(txn.restore) var(txn.modrepo),map(/etc/haproxy/modrepo.map)
    http-request set-var(txn.appuuid) path,field(4,/)
    http-request set-var(txn.vpath) path,field(3,/),concat(/,txn.appuuid,)
    acl is_repo_match  var(txn.vpath),strcmp(txn.modrepo) -m int 0
    acl is_repo_match  var(txn.vpath),strcmp(txn.restore) -m int 0
    acl delete_method  method DELETE
    acl is_lock_type   var(txn.rest_type) -m str locks

    # modules: check repo, allow DELETE on locks only
    http-request allow if is_module is_repo_match is_lock_type delete_method
    # modules: check repo and permit non-DELETE queries
    http-request allow if is_module is_repo_match !delete_method

    # deny everything else:
    http-request deny

    default_backend rclone_rest


# ==========================================================
# BACKENDS
# ==========================================================

backend rclone_webdav
    server webdav unix@/var/lib/rclone/backend-webdav.sock

backend rclone_rest
    server rest unix@/var/lib/rclone/backend-rest.sock
