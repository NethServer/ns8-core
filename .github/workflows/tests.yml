name: Test Core Modules
on:
  pull_request:
    types:
      - "labeled"
  workflow_dispatch:
env:
  NS8_CORE_MODULES: "core traefik loki ldapproxy metrics"

jobs:
  ns8:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'testing'
    name: Find NS8 cluster information
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.modules.outputs.list }}
    steps:
      - id: tag
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]
          then
            tag=${{ github.head_ref }}
          else
            tag="${{ github.ref_name }}"
          fi
          if [ "$tag" = "main" ]
          then
            tag="latest"
          fi
          # Sanitize tag, slash is forbidden
          echo "name=${tag//\//-}" >> $GITHUB_OUTPUT
      - id: modules
        run: |
          modules_list='[]'
          for module in ${NS8_CORE_MODULES}
          do
            if skopeo inspect "docker://ghcr.io/nethserver/${module}:${{ steps.tag.outputs.name }}"
            then
              modules_list=$(echo "${modules_list}"  | jq -c --arg m ghcr.io/nethserver/${module}:${{ steps.tag.outputs.name }} ' . + [$m]')
            fi
          done
          echo "list=${modules_list}" >> $GITHUB_OUTPUT

  check_ui_tests_needed:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'testing'
    name: Check UI tests needed
    uses: NethServer/ns8-github-actions/.github/workflows/check-ui-tests-needed.yml@v1
    with:
      ui_tests_strategy: on_renovate_ui_change
      head_sha: ${{ github.sha }}
      head_branch: ${{ github.head_ref || github.ref_name }}
      ui_dir: core/ui
      build_script: core/build-image.sh

  run_tests:
    name: "Run tests"
    needs: [ns8, check_ui_tests_needed]
    uses: NethServer/ns8-github-actions/.github/workflows/test-on-digitalocean-infra.yml@v1
    with:
      setup_cluster: false
      path: core/
      coremodules: ${{ join(fromJSON(needs.ns8.outputs.modules), ' ' ) }}
      run_ui_tests: ${{ needs.check_ui_tests_needed.outputs.ui_tests_needed == 'true' }}
    secrets:
      do_token: ${{ secrets.do_token }}
  remove_label:
    name: "Cleanup PR label"
    runs-on: ubuntu-latest
    needs: run_tests
    if: |
      github.event.label.name == 'testing' &&
      needs.infra_destroy.result == 'success' &&
      always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions-ecosystem/action-remove-labels@v1
        with:
          labels: testing
